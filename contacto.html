<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contacto - CDC Iturribero</title>
  <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

  <header class="header">
    <div class="container header-container">
      <a href="index.html" class="logo"><img src="img/logo/logo-iturribero.png" alt="Logo" class="logo-img"></a>
      <nav class="nav nav-container">
        <button class="menu-toggle">Menú</button>
        <ul class="menu-list" id="menu-list">
          <li><a href="index.html">Inicio</a></li>
          <li><a href="historia.html">Historia</a></li>
          <li><a href="equipos.html">Equipos</a></li>
          <li><a href="escuela.html">Escuela</a></li>
          <li><a href="contacto.html" class="active" style="color: #CC6A00;">Contacto</a></li>
          <li class="lang-switch"><a href="eu.html" aria-label="Aldatu euskarara">EU</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    <section class="hero-contacto">
      <h1>Contacta con nosotros</h1>
    </section>

    <div class="container contacto-container">
      <div class="contacto-grid">
        
        <div class="contacto-mapa">
          <iframe 
            src="https://maps.google.com/maps?q=Iturribero%20Kalea,%203,%2001520%20Durana,%20Araba&t=&z=15&ie=UTF8&iwloc=&output=embed" 
            width="100%" 
            height="550" 
            style="border:0;" 
            allowfullscreen="" 
            loading="lazy">
          </iframe>
        </div>

        <div class="contacto-info-form">
          
          <div class="contacto-datos">
            <h3>Nuestros Datos</h3>
            <p><strong>📍 Dirección:</strong> Iturribero Kalea, 3, 01520 - Durana (Araba)</p>
            <p><strong>✉️ Email:</strong> cdciturribero@gmail.com</p>
          </div>

          <div class="contacto-formulario">
            <h3>Envíanos un mensaje</h3>
            <form action="https://formsubmit.co/cdciturribero@gmail.com" method="POST">
              
              <input type="text" name="nombre" placeholder="Tu Nombre completo" required>
              <input type="email" name="email" placeholder="Tu Correo Electrónico" required>
              <input type="text" name="asunto" placeholder="Asunto (Ej: Inscripción Escuela)" required>
              <textarea name="mensaje" rows="5" placeholder="Escribe aquí tu mensaje o consulta..." required></textarea>
              
              <input type="hidden" name="_captcha" value="false">
              <button type="submit" class="btn btn-secondary">Enviar Mensaje</button>
            </form>
          </div>

        </div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <p>&copy; 2026 Club Deportivo Ciclista Iturribero. Todos los derechos reservados.</p>
    </div>
  </footer>

  <script>
    document.querySelector('.menu-toggle').addEventListener('click', () => {
        document.getElementById('menu-list').classList.toggle('active');
    });
  </script>

</body>
</html>
