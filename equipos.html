<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Equipos - CDC Iturribero</title>
  
  <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

  <header class="header">
    <div class="container header-container">
      <a href="index.html" class="logo" aria-label="Inicio">
        <img src="img/logo/logo-iturribero.png" alt="C.D. Ciclista Iturribero Durana" class="logo-img">
      </a>
      <nav class="nav">
        <button class="menu-toggle" aria-expanded="false" aria-controls="menu-list">Menú</button>
        <ul class="menu-list" id="menu-list">
          <li><a href="index.html">Inicio</a></li>
          <li><a href="historia.html">Historia</a></li>
          <li><a href="equipos.html" style="color: #CC6A00;">Equipos</a></li>
          <li><a href="escuela.html">Escuela</a></li>
          <li><a href="contacto.html" class="btn-contacto-menu">Contacto</a></li>
          <li class="lang-switch">
            <a href="#" class="active" aria-label="Castellano">ES</a>
            <span class="separator">|</span>
            <a href="taldeak.html" aria-label="Aldatu euskarara">EU</a>
          </li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    <section class="hero-equipos">
      <h1>Equipos</h1>
    </section>

    <div class="container equipos-container">
      
      <div class="equipo-row">
        <div class="equipo-img">
          <img src="img/historia/foto-antigua.jpg" alt="Equipo Invitec Iturribero Cadetes Juveniles" style="cursor: pointer;">
        </div>
        <div class="equipo-text">
          <h2>Invitec Iturribero</h2>
          <p>Cadetes, Juveniles...</p>
          <a href="equipo-invitec.html" class="btn btn-secondary">Seguir leyendo...</a>
        </div>
      </div>

    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <p>&copy; 2026 Club Deportivo Ciclista Iturribero. Todos los derechos reservados.</p>
      <p style="font-size: 0.9rem; margin-top: 0.5rem; color: #aaa;">Iturribero Kalea, 3 - 01520 - Durana (Araba)</p>
    </div>
  </footer>

  <!-- ESTRUCTURA DEL LIGHTBOX -->
  <div id="lightbox">
      <span id="close-btn">&times;</span>
      <span id="prev-btn">&#10094;</span>
      <img id="lightbox-img" src="" alt="Ampliada">
      <span id="next-btn">&#10095;</span>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
        const menuToggle = document.querySelector('.menu-toggle');
        const menuList = document.getElementById('menu-list');
        
        if (menuToggle && menuList) {
            menuToggle.addEventListener('click', () => {
                menuList.classList.toggle('active');
            });
        }

        const images = Array.from(document.querySelectorAll('.equipo-img img'));
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const closeBtn = document.getElementById('close-btn');
        const nextBtn = document.getElementById('next-btn');
        const prevBtn = document.getElementById('prev-btn');
        
        if(lightbox && images.length > 0) {
            let currentIndex = 0;

            const showImage = (index) => {
                lightboxImg.src = images[index].src;
                currentIndex = index;
            };

            images.forEach((img, index) => {
                img.addEventListener('click', () => {
                    showImage(index);
                    lightbox.style.display = 'flex';
                });
            });

            nextBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                showImage((currentIndex + 1) % images.length);
            });

            prevBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                showImage((currentIndex - 1 + images.length) % images.length);
            });

            closeBtn.addEventListener('click', () => {
                lightbox.style.display = 'none';
            });

            lightbox.addEventListener('click', (e) => {
                if (e.target === lightbox) lightbox.style.display = 'none';
            });
        }
    });
  </script>

</body>
</html>
